openapi: 3.0.0
info:
  title: Magic Items API
  version: 1.0.0
  description: API for managing magic items
  contact:
    name: Developer
servers:
  - url: http://localhost:8080
paths:
  /api/v1/items:
    get:
      summary: Retrieve a list of all magic items
      parameters:
        - in: query
          name: type
          schema:
            type: string
          description: Filter by item type
        - in: query
          name: rarity
          schema:
            type: string
          description: Filter by item rarity
        - in: query
          name: status
          schema:
            type: string
          description: Filter by item status
        - in: query
          name: minPower
          schema:
            type: integer
          description: Minimum power level
        - in: query
          name: maxPower
          schema:
            type: integer
          description: Maximum power level
        - in: query
          name: element
          schema:
            type: string
          description: Filter by element
      responses:
        '200':
          description: A list of items
        '500':
          description: Server error
    post:
      summary: Add a new magic item
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                type:
                  type: string
                element:
                  type: string
                power:
                  type: integer
                rarity:
                  type: string
                description:
                  type: string
                status:
                  type: string
      responses:
        '200':
          description: Item added successfully
        '500':
          description: Server error
  /api/v1/items/{name}:
    delete:
      summary: Delete a magic item by name
      parameters:
        - in: path
          name: name
          required: true
          schema:
            type: string
          description: The name of the item to delete
      responses:
        '200':
          description: Item deleted successfully
        '500':
          description: Server error
    put:
      summary: Update a magic item by name
      parameters:
        - in: path
          name: name
          required: true
          schema:
            type: string
          description: The name of the item to update
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                type:
                  type: string
                element:
                  type: string
                power:
                  type: integer
                rarity:
                  type: string
                description:
                  type: string
                status:
                  type: string
      responses:
        '200':
          description: Item updated successfully
        '500':
          description: Server error
